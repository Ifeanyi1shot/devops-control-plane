name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Simulate deploy
        run: |
          echo "Deploying commit ${{ github.sha }} to ${{ github.event.inputs.environment || 'staging' }}"
          echo "Image: ghcr.io/ifeanyi1shot/devops-control-plane:sha-${{ github.sha }}"
          echo "Deploy complete."

      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const env = context.payload.inputs?.environment || 'staging';
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: env,
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${context.sha.slice(0, 7)} to ${env}`,
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Deploy successful',
              environment_url: `https://${env}.devops-control-plane.internal`,
            });
            console.log(`Created deployment ${deployment.data.id} for ${env}`);
