# Service Registry
# Add or edit services here — no code changes needed.
# Fields:
#   id          unique slug used in URLs and audit logs
#   name        human-readable display name
#   repo        GitHub "owner/repo"
#   namespace   Kubernetes namespace
#   deployment  Kubernetes deployment name
#   owner       team or person responsible
#   onCall      (optional) on-call rotation name
#   runbookUrl  (optional) link to runbook docs
#   tags        arbitrary key/value labels

services:
