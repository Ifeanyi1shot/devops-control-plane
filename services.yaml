    name: DevOps Control Plane
    repo: Ifeanyi1shot/devops-control-plane
    namespace: production
    deployment: devops-control-plane
    owner: Ifeanyi1shot
    runbookUrl: https://github.com/Ifeanyi1shot/devops-control-plane/blob/main/README.md
    tags:
      team: platform
      tier: critical
